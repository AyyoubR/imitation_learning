experiment:
  name: bc_pilotnet_v1
  seed: 42
  output_dir: ./runs
  device: auto
  amp: true
data:
  root: ../carla_data/dataset
  camera: rgb_front
  label_formats:
  - parquet
  - csv
  - json
  filter:
    min_speed_kmh: null
    buckets: null
  split:
    strategy: episode
    val_fraction: 0.15
    test_fraction: 0.0
  image:
    crop_top: 40
    crop_bottom: 0
    resize_width: 200
    resize_height: 88
    normalize: imagenet
  augment:
    enabled: true
    brightness: 0.25
    contrast: 0.2
    hue_shift: 0.02
    gaussian_noise_std: 0.01
    rotation_deg: 2.0
    horizontal_flip_prob: 0.0
  sampler:
    enabled: true
    num_bins: 21
    smoothing: 0.05
    max_weight: 100.0
  loader:
    batch_size: 64
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
model:
  arch: deepcnn
  dropout: 0.2
  activation: bounded
  multi_task_steering_throttle_brake: false
training:
  epochs: 40
  loss:
    kind: smoothl1
    steer_weight: 1.0
    throttle_weight: 0.5
    brake_weight: 0.5
  optimizer:
    kind: adam
    lr: 0.0001
    weight_decay: 1.0e-05
    betas:
    - 0.9
    - 0.999
  scheduler:
    kind: cosine
    warmup_epochs: 2
    min_lr: 1.0e-06
  grad_clip: 1.0
  log_interval: 50
  tensorboard: true
  checkpoint:
    every_epochs: 1
    keep_last: 3
    save_best: true
  early_stopping:
    enabled: true
    patience: 8
    min_delta: 0.0001
evaluation:
  batch_size: 128
  num_workers: 4
  save_plots: true
  num_visual_samples: 16
